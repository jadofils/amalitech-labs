name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-contacts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contacts-management
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compile and run tests
        run: bash scripts/test.sh
